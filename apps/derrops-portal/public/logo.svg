<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="DerrOps app icon logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#162231"/>
      <stop offset="1" stop-color="#101B28"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0B1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#F5F7FA"/>
  <rect x="197" y="197" width="630" height="630" rx="112" fill="url(#bg)" filter="url(#softShadow)"/>

  <text x="512" y="542"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="138"
        font-weight="800"
        letter-spacing="-7">
    <tspan fill="#F4F7FB">Derr</tspan><tspan fill="#13B9D6">Ops</tspan>
  </text>
</svg>
