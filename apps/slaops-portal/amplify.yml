version: 1
applications:
  - appRoot: apps/slaops-portal
    env:
      variables:
        NODE_OPTIONS: "--max_old_space_size=4096"
    frontend:
      phases:
        preBuild:
          commands:
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ~/.pnpm-store/**/*
