# Build instance type (Standard/Large/XLarge) is set in Amplify Console:
# Hosting → Build settings → Advanced settings → Edit → Build instance type.
# Use Large (16 GiB) or XLarge (72 GiB) if builds run out of memory.
# Node heap below is set for Large (12000 MB); use 60000 for XLarge.
version: 1
applications:
  - appRoot: apps/slaops-portal
    env:
      variables:
        NODE_OPTIONS: "--max-old-space-size=12000"
    frontend:
      phases:
        preBuild:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm config set store-dir .pnpm-store
            - |
              if ! git diff --name-only HEAD^ HEAD | grep -q "^apps/slaops-portal/"; then
                echo "No changes in apps/slaops-portal, skipping build."
                touch /tmp/skip-build
              fi
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - ~/.pnpm-store/**/*
          - .turbo/**/*
          - node_modules/.cache/turbo/**/*
