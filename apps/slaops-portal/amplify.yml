# Build instance type (Standard/Large/XLarge) is set in Amplify Console:
# Hosting → Build settings → Advanced settings → Edit → Build instance type.
# Use Large (16 GiB) or XLarge (72 GiB) if builds run out of memory.
# Node heap below is set for Large (12000 MB); use 60000 for XLarge.
version: 1
applications:
  - appRoot: apps/slaops-portal
    env:
      variables:
        NODE_OPTIONS: "--max-old-space-size=12000"
    frontend:
      phases:
        preBuild:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm config set store-dir .pnpm-store
            - |
              set +e
              if ! git rev-parse HEAD^ >/dev/null 2>&1; then
                echo "Single commit or shallow clone, building to be safe."
              else
                changed=$(git diff --name-only HEAD^ HEAD)
                if echo "$changed" | grep -qE '^apps/slaops-portal/'; then
                  echo "Changes in apps/slaops-portal, building."
                elif echo "$changed" | grep -qE '^packages/'; then
                  echo "Changes in packages (portal dependencies), building."
                else
                  echo "No changes in apps/slaops-portal or packages, skipping build."
                  touch /tmp/skip-build
                fi
              fi
              set -e
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - ~/.pnpm-store/**/*
          - .turbo/**/*
          - node_modules/.cache/turbo/**/*
