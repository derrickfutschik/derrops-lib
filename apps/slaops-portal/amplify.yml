version: 1
applications:
  - appRoot: apps/slaops-portal
    env:
      variables:
        NODE_OPTIONS: "--max_old_space_size=4096"
    frontend:
      phases:
        preBuild:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=6144"
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm config set store-dir .pnpm-store
            - |
              if ! git diff --name-only HEAD^ HEAD | grep -q "^apps/slaops-portal/"; then
                echo "No changes in apps/slaops-portal, skipping build."
                touch /tmp/skip-build
              fi
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=6144"
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - ~/.pnpm-store/**/*
          - .turbo/**/*
          - node_modules/.cache/turbo/**/*
