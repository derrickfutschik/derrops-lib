# Build instance type (Standard/Large/XLarge) is set in Amplify Console:
# Hosting → Build settings → Advanced settings → Edit → Build instance type.
# Use Large (16 GiB) or XLarge (72 GiB) if builds run out of memory.
# Node heap below is set for Large (12000 MB); use 60000 for XLarge.
#
# buildPath: '/' runs install/build from repo root so cache paths (node_modules,
# .pnpm-store, .turbo) match where pnpm and Turbo actually write.
version: 1
applications:
  - appRoot: apps/slaops-portal
    env:
      variables:
        NODE_OPTIONS: "--max-old-space-size=12000"
        VITE_API_BASE_URL: "https://devserver.dersza.com"
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - sudo yum install -y java-11-amazon-corretto-headless
            - java -version
            - chmod +x apps/slaops-portal/amplify-prebuild.sh
            - ./apps/slaops-portal/amplify-prebuild.sh
        build:
          commands:
            - export NODE_OPTIONS="--max-old-space-size=12000"
            - chmod +x apps/slaops-portal/amplify-build.sh
            - ./apps/slaops-portal/amplify-build.sh
      artifacts:
        baseDirectory: apps/slaops-portal/dist
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - .turbo/**/*
          - node_modules/.cache/turbo/**/*
