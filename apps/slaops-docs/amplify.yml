version: 1
applications:
  - appRoot: apps/slaops-docs
    env:
      variables:
        NODE_OPTIONS: "--max_old_space_size=4096"
    frontend:
      phases:
        preBuild:
          commands:
            - |
              if ! git diff --name-only HEAD^ HEAD | grep -q "^apps/slaops-docs/"; then
                echo "No changes in apps/slaops-docs, skipping build."
                exit 0
              fi
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ~/.pnpm-store/**/*
