version: 1
applications:
  - appRoot: apps/slaops-docs
    env:
      variables:
        NODE_OPTIONS: "--max_old_space_size=4096"
    frontend:
      phases:
        preBuild:
          commands:
            - |
              if ! git diff --name-only HEAD^ HEAD | grep -q "^apps/slaops-docs/"; then
                echo "No changes in apps/slaops-docs, skipping build."
                echo "Creating placeholder build directory for AWS Amplify..."
                mkdir -p build
                echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://blog.slaops.com" /></head><body>Redirecting...</body></html>' > build/index.html
                exit 0
              fi
            - chmod +x amplify-prebuild.sh
            - ./amplify-prebuild.sh
        build:
          commands:
            - chmod +x amplify-build.sh
            - ./amplify-build.sh
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - ~/.pnpm-store/**/*
          - ../../.turbo/**/*
          - .docusaurus/**/*
