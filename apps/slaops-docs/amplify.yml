# buildPath: '/' runs install/build from repo root so cache paths match where
# pnpm and Turbo write (node_modules, .pnpm-store, .turbo at repo root).
version: 1
applications:
  - appRoot: apps/slaops-docs
    env:
      variables:
        NODE_OPTIONS: "--max_old_space_size=4096"
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - |
              if ! git diff --name-only HEAD^ HEAD | grep -q "^apps/slaops-docs/"; then
                echo "No changes in apps/slaops-docs, skipping build."
                echo "Creating placeholder build directory for AWS Amplify..."
                mkdir -p apps/slaops-docs/build
                echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://blog.slaops.com" /></head><body>Redirecting...</body></html>' > apps/slaops-docs/build/index.html
                exit 0
              fi
            - chmod +x apps/slaops-docs/amplify-prebuild.sh
            - ./apps/slaops-docs/amplify-prebuild.sh
        build:
          commands:
            - chmod +x apps/slaops-docs/amplify-build.sh
            - ./apps/slaops-docs/amplify-build.sh
      artifacts:
        baseDirectory: apps/slaops-docs/build
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - .turbo/**/*
          - node_modules/.cache/turbo/**/*
          - apps/slaops-docs/.docusaurus/**/*
