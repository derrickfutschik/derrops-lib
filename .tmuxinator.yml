# SLAOps Platform - tmuxinator configuration
# Start with: tmuxinator start -p .tmuxinator.yml
# Or: tmuxinator start slaops-apps (if installed to ~/.config/tmuxinator/)

name: slaops-apps
root: <%= ENV["PWD"] || Dir.pwd %>

# Set startup window
startup_window: slaops-docs

# Pre-window commands to ensure correct Node.js version
pre_window: |
  if [ -f "$HOME/.nvm/nvm.sh" ]; then
    source "$HOME/.nvm/nvm.sh"
    nvm use 22 2>/dev/null || nvm install 22
  fi

windows:

  - slaops-opensearch:
      root: .
      layout: tiled
      panes:
        - docker-compose up
        - echo "Waiting for containers to start..." && sleep 5 && docker logs -f opensearch
        - echo "Waiting for containers to start..." && sleep 5 && docker logs -f opensearch-dashboards

  - slaops-docs:
      root: apps/slaops-docs
      panes:
        - echo "Starting slaops-docs on port 3000..." && pnpm start

  - slaops-portal:
      root: apps/slaops-portal
      panes:
        - echo "Starting slaops-portal on port 8080..." && pnpm run dev

  - root:
      root: .
      panes:
        - echo "Root directory - use this for git, builds, etc."
