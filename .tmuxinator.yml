# SLAOps Platform - tmuxinator configuration
# Before starting, source the env file:
#   source .tmuxinator.env && tmuxinator start -p .tmuxinator.yml

name: slaops-apps
root: <%= ENV["PWD"] || Dir.pwd %>

# Set startup window
startup_window: root

# Pre-window commands to ensure correct Node.js version
pre_window: |
  if [ -f "$HOME/.nvm/nvm.sh" ]; then
    source "$HOME/.nvm/nvm.sh"
    nvm use 22 2>/dev/null || nvm install 22
  fi

windows:
  - root:
      root: .
      layout: even-vertical
      panes:
        - echo "Root directory - use this for git, builds, etc."

  - slaops-docs:
      root: apps/slaops-docs
      layout: even-vertical
      panes:
        - PORT=<%= ENV["DOCS_PORT"] %> NODE_ENV=dev pnpm start

  - slaops-portal:
      root: apps/slaops-portal
      layout: even-vertical
      panes:
        - PORT=<%= ENV["PORTAL_PORT"] %> NODE_ENV=dev pnpm run dev

  - slaops-cloud:
      root: apps/slaops-cloud
      layout: even-vertical
      panes:
        - >-
          echo "Migrating OpenSearch indices" &&
          NODE_ENV=dev pnpm --filter @slaops/cloud run opensearch:migrate:dev &&
          echo "Starting SLAOps Cloud" &&
          PORT=<%= ENV["CLOUD_PORT"] %> NODE_ENV=dev pnpm --filter @slaops/cloud run start:dev

  - slaops-cloudflared:
      root: .
      layout: even-vertical
      panes:
        - sleep <%= ENV["CF_STARTUP_DELAY"] %>
        - cloudflared tunnel create <%= ENV["CF_TUNNEL_LOCAL"] %>
        - cloudflared tunnel route dns <%= ENV["CF_TUNNEL_LOCAL"] %> <%= ENV["CF_DNS_1"] %>
        - cloudflared tunnel route dns <%= ENV["CF_TUNNEL_LOCAL"] %> <%= ENV["CF_DNS_2"] %>
        - cloudflared tunnel run <%= ENV["CF_TUNNEL_LOCAL"] %>

  - slaops-relay:
      root: apps/slaops-relay
      layout: even-vertical
      panes:
        - >-
          PORT=<%= ENV["RELAY_PORT"] %>
          NODE_ENV=dev
          RELAY_QUEUE_BACKEND=<%= ENV["RELAY_QUEUE_BACKEND"] %>
          RELAY_SECRET_BACKEND=<%= ENV["RELAY_SECRET_BACKEND"] %>
          AEGIS_JWKS_URL=<%= ENV["AEGIS_JWKS_URL"] %>
          pnpm run dev

  - slaops-aegis:
      root: apps/slaops-aegis
      layout: even-vertical
      panes:
        - >-
          AEGIS_PORT=<%= ENV["AEGIS_PORT"] %>
          NODE_ENV=dev
          AEGIS_ISSUER=<%= ENV["AEGIS_ISSUER"] %>
          AEGIS_SIGNING_KEY_ID=<%= ENV["AEGIS_SIGNING_KEY_ID"] %>
          ALLOWED_RELAY_IDS=<%= ENV["ALLOWED_RELAY_IDS"] %>
          pnpm run dev

  # Wire relay ↔ aegis after both services are up.
  # Relay trusts Aegis via AEGIS_JWKS_URL (set above).
  # Aegis only issues delegation JWTs for relay IDs in ALLOWED_RELAY_IDS (set above).
  # This window verifies the wiring with live curl checks and a smoke-test session.
  - relay-aegis-setup:
      root: .
      layout: even-vertical
      panes:
        - |
          echo "⏳  Waiting for aegis (<%= ENV["AEGIS_PORT"] %>) and relay (<%= ENV["RELAY_PORT"] %>) to be ready..."
          until curl -sf <%= ENV["AEGIS_JWKS_URL"] %> > /dev/null 2>&1; do sleep 2; done
          until curl -sf <%= ENV["RELAY_URL"] %>/health > /dev/null 2>&1; do sleep 2; done
          echo "✅  Both services ready."

          echo ""
          echo "=== [1/3] Aegis JWKS (relay will fetch this to validate delegation JWTs) ==="
          curl -sf <%= ENV["AEGIS_JWKS_URL"] %> | jq . \
            && echo "✅  Aegis JWKS OK" || echo "❌  Aegis not ready"

          echo ""
          echo "=== [2/3] Relay health ==="
          curl -sf <%= ENV["RELAY_URL"] %>/health | jq . \
            && echo "✅  Relay health OK" || echo "❌  Relay not ready"

          echo ""
          echo "=== [3/3] Smoke-test: issue Aegis session delegation JWT for relay ==="
          echo "    (CUSTOMER_IDP_JWKS_URL unset → IdP token validation skipped in dev)"
          curl -sf -X POST <%= ENV["AEGIS_ISSUER"] %>/v1/session \
            -H "Content-Type: application/json" \
            -d '{
              "tenantId": "<%= ENV["SMOKE_TENANT_ID"] %>",
              "userToken": "<%= ENV["SMOKE_USER_TOKEN"] %>",
              "requestedScopes": [
                {
                  "apiId": "<%= ENV["SMOKE_API_ID"] %>",
                  "environment": "<%= ENV["SMOKE_ENVIRONMENT"] %>",
                  "relayId": "<%= ENV["ALLOWED_RELAY_IDS"] %>"
                }
              ]
            }' | jq . \
            && echo "✅  Session delegation JWT issued" || echo "❌  Session request failed"

          echo ""
          echo "=== Setup complete. Services ready at: ==="
          echo "    Relay  → <%= ENV["RELAY_URL"] %>  (Swagger: /api)"
          echo "    Aegis  → <%= ENV["AEGIS_ISSUER"] %>  (Swagger: /api)"

  - slaops-tests:
      root: .
      layout: even-vertical
      panes:
        - pnpm run test:watch:notify

  - devserver:
      root: .
      layout: even-vertical
      panes:
        - ssh -t <%= ENV["DEVSERVER_USER"] %>@<%= ENV["DEVSERVER_IP"] %>

  - opensearch:
      root: .
      layout: even-vertical
      panes:
        - ssh -t <%= ENV["DEVSERVER_USER"] %>@<%= ENV["DEVSERVER_IP"] %> "cd <%= ENV["DEVSERVER_PATH"] %> && docker compose logs -f opensearch"

  - opensearch-dashboards:
      root: .
      layout: even-vertical
      panes:
        - ssh -t <%= ENV["DEVSERVER_USER"] %>@<%= ENV["DEVSERVER_IP"] %> "cd <%= ENV["DEVSERVER_PATH"] %> && docker compose logs -f opensearch-dashboards"

  - localstack:
      root: .
      layout: even-vertical
      panes:
        - ssh -t <%= ENV["DEVSERVER_USER"] %>@<%= ENV["DEVSERVER_IP"] %> "cd <%= ENV["DEVSERVER_PATH"] %> && docker compose logs -f localstack"

  - postgres:
      root: .
      layout: even-vertical
      panes:
        - ssh -t <%= ENV["DEVSERVER_USER"] %>@<%= ENV["DEVSERVER_IP"] %> "cd <%= ENV["DEVSERVER_PATH"] %> && docker compose logs -f postgres"

  - cloudflare:
      root: .
      layout: even-vertical
      panes:
        - sleep <%= ENV["CF_STARTUP_DELAY"] %> && cloudflared tunnel route dns <%= ENV["CF_TUNNEL_DEV"] %> <%= ENV["CF_DNS_DEV"] %>
