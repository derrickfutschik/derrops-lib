# SLAOps Platform - tmuxinator configuration
# Start with: tmuxinator start -p .tmuxinator.yml
# Or: tmuxinator start slaops-apps (if installed to ~/.config/tmuxinator/)

name: slaops-apps
root: <%= ENV["PWD"] || Dir.pwd %>

# Set startup window
startup_window: root

# Pre-window commands to ensure correct Node.js version
pre_window: |
  if [ -f "$HOME/.nvm/nvm.sh" ]; then
    source "$HOME/.nvm/nvm.sh"
    nvm use 22 2>/dev/null || nvm install 22
  fi

windows:

  - root:
      root: .
      layout: even-vertical
      panes:
        - echo "Root directory - use this for git, builds, etc."

  - slaops-docs:
      root: apps/slaops-docs
      layout: even-vertical
      panes:
        - pnpm start
        - echo "Starting slaops-docs on port 3000..."

  - slaops-portal:
      root: apps/slaops-portal
      layout: even-vertical
      panes:
        - pnpm run dev
        - echo "Starting slaops-portal on port 8080..."

  - slaops-cloud:
      root: apps/slaops-cloud
      layout: even-vertical
      panes:
        - pnpm --filter slaops-cloud run start:dev
        - echo "Starting slaops-cloud on port 8083..."

  - slaops-tests:
      root: .
      layout: even-vertical
      panes:
        - pnpm run test:watch:notify

  - syncthing:
      root: .
      layout: even-vertical
      panes:
        - echo "Sync Thing for syncing to the remote server" && syncthing

  - devserver:
      root: .
      layout: even-vertical
      panes:
        - ssh -t derrick@192.168.7.224 

  - opensearch:
      root: .
      layout: even-vertical
      panes:
        - ssh -t derrick@192.168.7.224 "cd /home/derrick/slaops/slaops-platform && docker compose logs -f opensearch"

  - opensearch-dashboards:
      root: .
      layout: even-vertical
      panes:
        - ssh -t derrick@192.168.7.224 "cd /home/derrick/slaops/slaops-platform && docker compose logs -f opensearch-dashboards"

  - localstack:
      root: .
      layout: even-vertical
      panes:
        - ssh -t derrick@192.168.7.224 "cd /home/derrick/slaops/slaops-platform && docker compose logs -f localstack"

  - postgres:
      root: .
      layout: even-vertical
      panes:
        - ssh -t derrick@192.168.7.224 "cd /home/derrick/slaops/slaops-platform && docker compose logs -f postgres"
